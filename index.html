<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aleksa Vulin | Follow The Herd</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&display=swap');

        :root {
            --red: #cf0000;
            --dark-red: #4a0000;
            --bg: #050505;
            --text: #e0e0e0;
            --grey: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            overflow-x: hidden;
            transition: background-color 1.5s ease;
        }

        html { scroll-behavior: smooth; }

        body.end-reached { background-color: #1a0202 !important; }

        #noise-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9998;
            opacity: 0.07;
        }

        .vhs-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
        }

        nav {
            position: fixed;
            top: 0; width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 50px;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--dark-red);
            z-index: 10000;
            font-family: 'VT323', monospace;
        }

        .nav-left { display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .logo-img { height: 45px; width: auto; filter: invert(1); mix-blend-mode: screen; }
        .rec-dot { width: 12px; height: 12px; background: var(--red); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        .nav-center a { color: var(--text); text-decoration: none; margin: 0 15px; font-size: 20px; transition: 0.3s; opacity: 0.5; }
        .nav-center a:hover { opacity: 1; color: var(--red); }
        #timer { color: var(--red); font-size: 20px; min-width: 110px; }

        .hero { position: relative; height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 0 10%; border-bottom: 1px solid var(--dark-red); }
        .hero-video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.35; mask-image: radial-gradient(circle, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 80%); -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 80%); }
        .hero-video-container video { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1) brightness(0.8); }

        .hero h1 { font-family: 'VT323', monospace; font-size: clamp(32px, 7vw, 90px); line-height: 1.1; color: white; margin-bottom: 20px; text-transform: uppercase; }
        .hero h1 span { color: var(--red); }
        .cursor { display: inline-block; width: 3px; height: 0.7em; background-color: var(--red); margin-left: 10px; animation: blink-cursor 0.8s infinite; transform: translateY(15%); }
        @keyframes blink-cursor { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .name-tag { font-family: 'VT323', monospace; font-size: 22px; color: var(--red); margin-bottom: 10px; }
        .hero p { max-width: 600px; opacity: 0.9; font-size: 18px; margin-bottom: 30px; line-height: 1.5; color: white; }
